<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f4f0" />
    <title>XVI / 十六开 · 产品设计问卷</title>
    <link rel="stylesheet" href="questionnaire.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="wordmark" href="questionnaire.html" aria-label="XVI 问卷首页">XVI</a>
      <div class="title-block">
        <strong>十六开 / 产品设计问卷</strong>
        <span id="saveStatus">已保存</span>
      </div>
      <div class="top-actions">
        <button class="quiet-button" id="downloadButton" type="button">导出</button>
        <button class="primary-button" id="copyButton" type="button">复制回答</button>
      </div>
    </header>

    <main class="shell">
      <aside class="section-nav">
        <div class="progress-block">
          <div class="progress-copy"><span>完成进度</span><strong id="progressText">0 / 86</strong></div>
          <div class="progress-track"><i id="progressBar"></i></div>
        </div>
        <nav id="sectionLinks" aria-label="问卷章节"></nav>
        <button class="reset-button" id="resetButton" type="button">清空全部回答</button>
      </aside>

      <section class="form-area">
        <header class="form-intro">
          <p>XVI / PRODUCT DISCOVERY / 016</p>
          <h1>决定下一版 XVI<br />应该成为怎样的工具</h1>
          <div class="intro-meta">
            <span>核心问题以 16 标记</span>
            <span>可分多次填写</span>
          </div>
        </header>

        <form id="questionnaireForm"></form>

        <footer class="form-footer">
          <div><strong id="footerProgress">尚未开始</strong><span>回答会保留在当前浏览器</span></div>
          <button class="primary-button large" id="footerCopyButton" type="button">复制完整回答</button>
        </footer>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="questionnaire-data.js"></script>
    <script src="questionnaire.js"></script>
  </body>
</html>
