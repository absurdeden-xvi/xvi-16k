<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#eef1ef" />
    <meta name="description" content="XVI / 十六开，为中文创作者设计的文本长图排版器。" />
    <meta name="apple-mobile-web-app-title" content="XVI / 十六开" />
    <title>XVI / 十六开</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-regular.css" />
    <link rel="stylesheet" href="https://fontsapi.zeoseven.com/256/main/result.css" />
    <link rel="stylesheet" href="https://fontsapi.zeoseven.com/7/main/result.css" />
    <link rel="stylesheet" href="https://fontsapi.zeoseven.com/22/main/result.css" />
    <link rel="stylesheet" href="https://fontsapi.zeoseven.com/192/main/result.css" />
    <link rel="stylesheet" href="https://fontsapi.zeoseven.com/376/main/result.css" />
    <link rel="stylesheet" href="https://fontsapi.zeoseven.com/634/main/result.css" />
    <link rel="stylesheet" href="styles.css?v=0.7.7" />
    <link rel="stylesheet" href="xvi-next.css?v=0.7.7" />
  </head>
  <body data-mobile-tab="content">
    <header class="app-header">
      <div class="brand-block">
        <div class="brand-mark" aria-label="XVI"><span>X</span><span>V</span><i>I</i></div>
        <div><h1>十六开</h1><p>XVI / 016</p></div>
      </div>
      <div class="header-actions">
        <span class="save-state" id="saveState">已保存</span>
        <button class="button settings-button" id="settingsOpenButton" type="button" title="设置" aria-label="设置"><span class="settings-glyph" aria-hidden="true"><b>A</b><i>文</i></span></button>
        <button class="button feedback-button" id="feedbackOpenButton" type="button">来信</button>
        <button class="button button-primary" id="exportButton" type="button" title="PNG · 1792 px · 自动高度" disabled><span aria-hidden="true">↓</span>快速导出</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="editor-panel" data-step="01" aria-label="长图编辑器">
        <div class="panel-tabs" role="tablist" aria-label="创作流程">
          <button class="tab active" data-tab="content" role="tab" aria-selected="true"><b>写</b>文字</button>
          <button class="tab" data-tab="design" role="tab" aria-selected="false"><b>形</b>样式</button>
          <button class="tab" data-tab="export" role="tab" aria-selected="false"><b>存</b>导出</button>
        </div>
        <section class="tab-panel active" data-panel="content">
          <div class="field-group compact-grid">
            <label><span>标题</span><input id="titleInput" type="text" maxlength="80" placeholder="标题" /></label>
            <label><span>署名</span><input id="authorInput" type="text" maxlength="40" placeholder="作者" /></label>
          </div>
          <div class="field-group text-field">
            <span class="field-heading"><span>正文</span><span id="charCount">0 字</span></span>
            <div class="format-toolbar" aria-label="文字格式">
              <button type="button" data-format-command="bold" title="粗体" aria-label="粗体"><strong>B</strong></button>
              <button type="button" data-format-command="italic" title="斜体" aria-label="斜体"><i>I</i></button>
              <button type="button" data-format-command="underline" title="下划线" aria-label="下划线"><u>U</u></button>
              <button type="button" data-format-command="strikeThrough" title="删除线" aria-label="删除线"><s>S</s></button>
              <div class="script-picker" id="scriptPicker">
                <button class="script-picker-trigger" id="scriptPickerButton" type="button" aria-haspopup="menu" aria-expanded="false">简繁</button>
                <div class="script-picker-menu" id="scriptPickerMenu" role="menu" hidden>
                  <button type="button" role="menuitem" data-script-action="simplified">简中</button>
                  <button type="button" role="menuitem" data-script-action="traditional-hk">繁中（港）</button>
                  <button type="button" role="menuitem" data-script-action="traditional-tw">繁中（台）</button>
                </div>
              </div>
              <button type="button" data-format-command="removeFormat" title="清除格式" aria-label="清除格式">×</button>
            </div>
            <div id="bodyInput" class="rich-editor" contenteditable="true" spellcheck="false"></div>
            <p class="privacy-note">正文与生成图片只在本地浏览器处理，不会上传云端。</p>
          </div>
          <div class="preference-block">
            <div class="preference-title">文本处理</div>
            <label class="toggle-row generation-option"><span><strong>清理并智能分段</strong><small>仅在粘贴后的换行混乱时开启</small></span><input id="smartParagraphToggle" type="checkbox" /></label>
          </div>
          <button class="generate-button" id="generateButton" type="button"><span><b>16</b><small>COMPOSE</small></span><strong>生成排版</strong><i aria-hidden="true">→</i></button>
          <div class="quick-actions"><button class="button button-quiet" id="clearButton" type="button">清空</button></div>
        </section>

        <section class="tab-panel" data-panel="design">
          <div class="field-group">
            <div class="field-group-title"><span>配色灵感</span><button id="randomPresetButton" type="button" title="从全部配色中随机选择" aria-label="从全部配色中随机选择">随机</button></div>
            <div class="palette-mode" aria-label="明暗主题">
              <button class="active" data-palette-mode="light" type="button">浅色</button>
              <button data-palette-mode="dark" type="button">深色</button>
            </div>
            <div class="palette-selection-name" id="paletteSelectionName">晨雾</div>
            <div class="palette-family-row" aria-label="色系">
              <button class="family-neutral active" data-palette-family="neutral" type="button" title="中性" aria-label="中性色系"></button>
              <button class="family-rose" data-palette-family="rose" type="button" title="红" aria-label="红色系"></button>
              <button class="family-green" data-palette-family="green" type="button" title="绿" aria-label="绿色系"></button>
              <button class="family-purple" data-palette-family="purple" type="button" title="紫" aria-label="紫色系"></button>
              <button class="family-amber" data-palette-family="amber" type="button" title="黄" aria-label="黄色系"></button>
              <button class="family-blue" data-palette-family="blue" type="button" title="蓝" aria-label="蓝色系"></button>
            </div>
            <div class="special-palette-title">特别配色</div>
            <div class="special-palette-grid">
              <button class="special-preset" data-preset="blueprint" type="button"><i class="blueprint"></i><span>蓝晒</span></button>
              <button class="special-preset" data-preset="roseLetter" type="button"><i class="roseLetter"></i><span>常春藤</span></button>
              <button class="special-preset" data-preset="vermilion" type="button"><i class="vermilion"></i><span>玻璃海</span></button>
              <button class="special-preset" data-preset="aster" type="button"><i class="aster"></i><span>夜汐</span></button>
              <button class="special-preset" data-preset="newsprint" type="button"><i class="newsprint"></i><span>铅字</span></button>
              <button class="special-preset" data-preset="acidNight" type="button"><i class="acidNight"></i><span>夜萤</span></button>
              <button class="special-preset" data-preset="latePeach" type="button"><i class="latePeach"></i><span>星盘</span></button>
              <button class="special-preset" data-preset="seaMark" type="button"><i class="seaMark"></i><span>潮痕</span></button>
              <button class="special-preset" data-preset="farTide" type="button"><i class="farTide"></i><span>远潮水</span></button>
              <button class="special-preset" data-preset="pineSmoke" type="button"><i class="pineSmoke"></i><span>青案</span></button>
              <button class="special-preset" data-preset="oriole" type="button"><i class="oriole"></i><span>绯页</span></button>
              <button class="special-preset" data-preset="gooseShadow" type="button"><i class="gooseShadow"></i><span>春雷</span></button>
              <button class="special-preset" data-preset="blueCurtain" type="button"><i class="blueCurtain"></i><span>蓝钟</span></button>
              <button class="special-preset" data-preset="mulberry" type="button"><i class="mulberry"></i><span>日晷</span></button>
              <button class="special-preset" data-preset="nightSakura" type="button"><i class="nightSakura"></i><span>夜樱</span></button>
              <button class="special-preset" data-preset="camelliaPaper" type="button"><i class="camelliaPaper"></i><span>山茶笺</span></button>
            </div>
          </div>
          <div class="color-grid">
            <label>背景<span class="color-input-wrap"><input id="backgroundColor" type="color" value="#eef2f3" /><output id="backgroundColorValue">#EEF2F3</output></span></label>
            <label>文字<span class="color-input-wrap"><input id="textColor" type="color" value="#26333a" /><output id="textColorValue">#26333A</output></span></label>
            <label>标题<span class="color-input-wrap"><input id="titleColor" type="color" value="#26333a" /><output id="titleColorValue">#26333A</output></span></label>
            <label>强调<span class="color-input-wrap"><input id="accentColor" type="color" value="#9ebbc4" /><output id="accentColorValue">#9EBBC4</output></span></label>
          </div>
          <div class="field-group layout-family">
            <div class="field-group-title"><span>刊页模板</span></div>
            <div class="layout-template-grid">
              <button class="layout-template layout-folio active" data-layout-template="folio" type="button"><i><b></b><em></em><span></span></i><strong>标准刊页</strong></button>
              <button class="layout-template layout-book" data-layout-template="book" type="button"><i><b></b><em></em><span></span></i><strong>书页</strong></button>
              <button class="layout-template layout-letter" data-layout-template="letter" type="button"><i><b></b><em></em><span></span></i><strong>信笺</strong></button>
              <button class="layout-template layout-section" data-layout-template="section" type="button"><i><b></b><em></em><span></span></i><strong>分节长页</strong></button>
            </div>
          </div>
          <div class="field-group compact-grid font-selectors">
            <label>正文字体<select id="fontFamily"><optgroup label="拉丁 / Latin"><option value="latinSerif">编辑衬线</option><option value="latinHumanist">人文无衬线</option><option value="latinGrotesk">新无衬线</option><option value="latinMono">拉丁等宽</option></optgroup><optgroup label="中文 / CJK"><option value="serif">宋体</option><option value="pingfang">苹方</option><option value="neoZhiSong">霞鹜新致宋</option><option value="wenjin">文津宋体</option><option value="huiwen">汇文明朝体</option><option value="zhuque">朱雀仿宋</option><option value="winsong">司源赢宋</option><option value="lxgw">霞鹜文楷</option><option value="yozai">悠哉字体</option><option value="mono">等宽</option></optgroup></select></label>
            <label>标题字体<select id="titleFontFamily"><optgroup label="拉丁 / Latin"><option value="latinDisplay">展示衬线</option><option value="latinSerif">编辑衬线</option><option value="latinHumanist">人文无衬线</option><option value="latinGrotesk">新无衬线</option><option value="latinMono">拉丁等宽</option></optgroup><optgroup label="中文 / CJK"><option value="serif">宋体</option><option value="pingfang">苹方</option><option value="neoZhiSong">霞鹜新致宋</option><option value="wenjin">文津宋体</option><option value="huiwen">汇文明朝体</option><option value="zhuque">朱雀仿宋</option><option value="winsong">司源赢宋</option><option value="lxgw">霞鹜文楷</option><option value="yozai">悠哉字体</option><option value="mono">等宽</option></optgroup></select></label>
          </div>
          <label class="font-upload" for="customFontInput"><input id="customFontInput" type="file" accept=".ttf,.otf,.woff,.woff2,font/ttf,font/otf,font/woff,font/woff2" /><span>＋ 导入本地字体</span><small id="customFontName">TTF · OTF · WOFF</small></label>
          <div class="control-row"><label>正文字号<span><input class="number-field" data-setting="fontSize" type="number" min="16" max="72" value="32" /> px</span></label><input id="fontSize" type="range" min="16" max="72" value="32" /></div>
          <div class="control-row"><label>标题字号<span><input class="number-field" data-setting="titleSize" type="number" min="32" max="120" value="56" /> px</span></label><input id="titleSize" type="range" min="32" max="120" step="2" value="56" /></div>
          <div class="control-row"><label>行距<span><input class="number-field" data-setting="lineHeight" type="number" min="1.2" max="3" step="0.05" value="1.9" /></span></label><input id="lineHeight" type="range" min="1.2" max="3" step="0.05" value="1.9" /></div>
          <div class="field-group paragraph-tools">
            <div class="field-group-title"><span>段落</span></div>
            <label class="toggle-row compact-toggle"><span><strong>首行缩进</strong><small>每段开头退两个字</small></span><input id="indentToggle" type="checkbox" checked /></label>
            <fieldset class="field-group lead-style-field">
              <legend>首段强调</legend>
              <div class="segmented-control lead-style-control">
                <button type="button" data-lead-style="none">无</button>
                <button type="button" data-lead-style="line">引线</button>
                <button type="button" data-lead-style="color" class="active">变色</button>
              </div>
              <input id="leadStyle" type="hidden" value="color" />
            </fieldset>
            <div class="control-row lead-scale-row"><label>首段字号<span><input class="number-field" data-setting="leadScale" type="number" min="0.8" max="1.5" step="0.05" value="1.05" /> 倍</span></label><input id="leadScale" type="range" min="0.8" max="1.5" step="0.05" value="1.05" /></div>
            <fieldset class="field-group paragraph-gap-field">
              <legend>段间</legend>
              <div class="segmented-control paragraph-gap-control">
                <button type="button" data-paragraph-gap="0">0</button>
                <button type="button" data-paragraph-gap="0.5">0.5</button>
                <button type="button" data-paragraph-gap="1">1</button>
                <button type="button" data-paragraph-gap="1.25">1.25</button>
                <button type="button" data-paragraph-gap="1.5">1.5</button>
                <button type="button" data-paragraph-gap="2">2</button>
              </div>
            </fieldset>
          </div>
          <details class="advanced-settings">
            <summary>高级排版<span>展开</span></summary>
            <div class="advanced-content">
              <div class="field-group compact-grid">
                <label>标题字重<select id="titleWeight"><option value="400">Regular / 400</option><option value="600">Semibold / 600</option><option value="700" selected>Bold / 700</option><option value="900">Black / 900</option></select></label>
                <label>版式结构<select id="compositionStyle"><option value="editorial">标准</option><option value="compact">紧凑</option><option value="open">舒展</option></select></label>
              </div>
              <div class="field-group compact-grid header-copy-fields">
                <label>右上角文字<input id="editionText" type="text" maxlength="40" value="XVI / 016" /></label>
                <label>标题上方文字<input id="kickerText" type="text" maxlength="50" value="" placeholder="可留空，或填写章节 / 日期 / 栏目" /></label>
              </div>
              <div class="template-specific-settings book-settings">
                <label>章节标识<input id="chapterText" type="text" maxlength="24" value="Chapter 01" placeholder="Chapter 01" /></label>
                <div class="control-row"><label>章节字号<span><input class="number-field" data-setting="chapterSize" type="number" min="10" max="52" value="18" /> px</span></label><input id="chapterSize" type="range" min="10" max="52" value="18" /></div>
              </div>
              <div class="template-specific-settings section-settings">
                <label>节号（仅分节长页）<input id="sectionNumber" type="text" maxlength="12" value="" placeholder="例如 01 / 第一章；留空不显示" /></label>
                <div class="control-row"><label>节号字号<span><input class="number-field" data-setting="sectionNumberSize" type="number" min="36" max="140" step="2" value="82" /> px</span></label><input id="sectionNumberSize" type="range" min="36" max="140" step="2" value="82" /></div>
              </div>
              <div class="control-row"><label>字距<span><input class="number-field" data-setting="letterSpacing" type="number" min="-2" max="12" step="0.5" value="2" /> px</span></label><input id="letterSpacing" type="range" min="-2" max="12" step="0.5" value="2" /></div>
              <div class="control-row"><label>段距<span><input class="number-field" data-setting="paragraphSpacing" type="number" min="0" max="3" step="0.05" value="1" /> em</span></label><input id="paragraphSpacing" type="range" min="0" max="3" step="0.05" value="1" /></div>
              <div class="control-row"><label>画布宽度<span><input class="number-field" data-setting="contentWidth" type="number" min="640" max="1440" value="896" /> px</span></label><input id="contentWidth" type="range" min="640" max="1440" step="16" value="896" /></div>
              <div class="control-row"><label>页边距<span><input class="number-field" data-setting="pagePadding" type="number" min="24" max="240" value="88" /> px</span></label><input id="pagePadding" type="range" min="24" max="240" step="8" value="88" /></div>
              <fieldset class="field-group"><legend>对齐</legend><div class="segmented-control" id="alignmentControl"><button type="button" data-align="left" class="active">左对齐</button><button type="button" data-align="justify">两端</button><button type="button" data-align="center">居中</button></div></fieldset>
              <label class="toggle-row"><span><strong>版头信息</strong><small>显示 XVI、版次与信号条</small></span><input id="headerToggle" type="checkbox" checked /></label>
              <label class="toggle-row"><span><strong>底部署名</strong><small>在正文后显示作者</small></span><input id="signatureToggle" type="checkbox" checked /></label>
            </div>
          </details>
        </section>

        <section class="tab-panel" data-panel="export">
          <div class="export-summary"><span>导出尺寸</span><strong id="exportCanvasInfo">1792 px · 高清</strong></div>
          <fieldset class="field-group"><legend>格式</legend><div class="segmented-control export-format"><button type="button" data-format="png" class="active">PNG</button><button type="button" data-format="jpeg">JPG</button></div></fieldset>
          <div class="field-group"><label for="exportScale">清晰度</label><select id="exportScale"><option value="1">普通 896 px</option><option value="2" selected>高清 1792 px</option><option value="3">超清 2688 px</option></select></div>
          <div class="field-group"><label for="exportFileName">保存名称</label><input id="exportFileName" type="text" placeholder="留空则使用标题" /></div>
          <div class="export-note"><strong>放心使用</strong><span>正文、字体与生成图片只在本地浏览器处理，不会上传云端。只有主动提交“来信”时，反馈内容才会发送给我们。</span></div>
          <button class="generate-button export-action" id="exportPanelButton" type="button" disabled><span><b>↓</b><small>SAVE</small></span><strong>保存图片</strong><i aria-hidden="true">→</i></button>
        </section>
      </aside>

      <section class="preview-stage" aria-label="长图预览">
        <div class="preview-toolbar"><div><strong>长图预览</strong><span id="canvasInfo">896 × 自动高度</span></div><div class="zoom-control"><button id="zoomOut" type="button" aria-label="缩小预览" title="缩小预览">−</button><output id="zoomValue">55%</output><button id="zoomIn" type="button" aria-label="放大预览" title="放大预览">＋</button></div></div>
        <div class="preview-inspector" id="previewInspector" hidden>
          <strong id="previewInspectorLabel">标题</strong>
          <button type="button" data-preview-step="-1" aria-label="减小字号">−</button>
          <output id="previewInspectorValue">56 px</output>
          <button type="button" data-preview-step="1" aria-label="增大字号">＋</button>
          <label title="颜色"><input id="previewInspectorColor" type="color" /></label>
          <div class="preview-lead-modes" id="previewLeadModes" hidden><button type="button" data-lead-style="none">无</button><button type="button" data-lead-style="line">线</button><button type="button" data-lead-style="color">色</button></div>
          <div class="preview-format-modes" id="previewFormatModes" hidden>
            <button type="button" data-preview-format="bold" aria-label="加粗" title="加粗（⌘/Ctrl+B）"><b>B</b></button>
            <button type="button" data-preview-format="italic" aria-label="斜体" title="斜体（⌘/Ctrl+I）"><i>I</i></button>
            <button type="button" data-preview-format="underline" aria-label="下划线" title="下划线（⌘/Ctrl+U）"><u>U</u></button>
            <button type="button" data-preview-format="strikeThrough" aria-label="删除线" title="删除线（⌘/Ctrl+Shift+X）"><s>S</s></button>
          </div>
          <button class="preview-inspector-close" id="previewInspectorClose" type="button" aria-label="关闭">×</button>
        </div>
        <div class="preview-scroll" id="previewScroll">
          <div class="preview-empty" id="previewEmpty"><span>XVI</span><strong>尚未生成</strong></div>
          <article class="poster" id="poster" hidden>
            <div class="poster-index"><span>XVI</span><span id="posterEdition">XVI / 016</span></div>
            <div class="poster-accent"></div>
            <header class="poster-header"><p class="poster-kicker" id="posterKicker"></p><h2 id="previewTitle" contenteditable="true" spellcheck="false"></h2></header>
            <div class="poster-rule"></div><div class="poster-body" id="previewBody" contenteditable="true" spellcheck="false" aria-label="可直接编辑的正文"></div>
            <footer class="poster-footer" id="previewFooter"><span class="footer-line"></span><p id="previewAuthor"></p><span class="footer-edition">XVI / 十六开</span></footer>
          </article>
        </div>
      </section>
    </main>
    <div class="settings-modal" id="settingsModal" hidden>
      <div class="settings-backdrop" data-settings-close></div>
      <section class="settings-card" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="settings-head">
          <strong id="settingsTitle">设置</strong>
          <button type="button" data-settings-close aria-label="关闭">×</button>
        </div>
        <div class="settings-row">
          <span>语言</span>
          <div class="settings-language" role="group" aria-label="界面语言">
            <button class="active" type="button" data-language="zh">中文</button>
            <button type="button" data-language="en">English</button>
          </div>
        </div>
      </section>
    </div>
    <!-- Only this explicit form is sent to the legacy receiver; article content is never included. -->
    <div class="feedback-modal" id="feedbackModal" hidden>
      <div class="feedback-backdrop" data-feedback-close></div>
      <form class="feedback-card" id="feedbackForm" name="xvi-feedback" method="POST" data-netlify="true" netlify-honeypot="bot-field">
